<script>
  (() => {
    const header = document.querySelector('[data-site-header]');
    if (!header) return;

    const toggle = header.querySelector('[data-menu-toggle]');
    const drawer = header.querySelector('[data-menu-drawer]');
    const backButton = header.querySelector('[data-menu-back]');
    const title = header.querySelector('[data-menu-title]');
    const languageSwitcher = header.querySelector('[data-language-switcher]');
    const menuTitles = {
      root: "\"菜单\"",
      
    };

    let activePanel = 'root';

    const closeLanguageSwitcher = () => {
      if (languageSwitcher) languageSwitcher.removeAttribute('open');
    };

    const showPanel = (panelName) => {
      activePanel = panelName;
      header.querySelectorAll('[data-menu-panel]').forEach((panel) => {
        panel.hidden = panel.dataset.menuPanel !== panelName;
      });
      backButton.hidden = panelName === 'root';
      title.textContent = menuTitles[panelName] || menuTitles.root;
    };

    const closeDrawer = () => {
      header.dataset.menuState = 'closed';
      toggle.setAttribute('aria-expanded', 'false');
      toggle.setAttribute('aria-label', "\"打开菜单\"");
      drawer.hidden = true;
      document.body.classList.remove('is-menu-open');
      showPanel('root');
    };

    const openDrawer = () => {
      closeLanguageSwitcher();
      drawer.hidden = false;
      requestAnimationFrame(() => {
        header.dataset.menuState = 'open';
        toggle.setAttribute('aria-expanded', 'true');
        toggle.setAttribute('aria-label', "\"Close menu\"");
        document.body.classList.add('is-menu-open');
      });
    };

    toggle.addEventListener('click', () => {
      const isOpen = header.dataset.menuState === 'open';
      if (isOpen) {
        closeDrawer();
      } else {
        openDrawer();
      }
    });

    header.querySelectorAll('[data-menu-open]').forEach((button) => {
      button.addEventListener('click', () => {
        showPanel(button.dataset.menuOpen);
      });
    });

    backButton.addEventListener('click', () => showPanel('root'));

    document.addEventListener('click', (event) => {
      if (!languageSwitcher || !languageSwitcher.hasAttribute('open')) return;
      if (!languageSwitcher.contains(event.target)) {
        closeLanguageSwitcher();
      }
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth >= 1024) {
        closeDrawer();
      }
    });

    showPanel('root');
    closeDrawer();
  })();
</script>
