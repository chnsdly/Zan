<!DOCTYPE html>
<html lang="{{ .Site.Language.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Title | default .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ i18n "site_description" }}{{ end }}">
    {{ $scss := resources.Get "scss/main.scss" | toCSS (dict "targetPath" "css/style.css") }}
    <link rel="stylesheet" href="{{ $scss.RelPermalink }}">

    {{/* SEO：声明当前页规范地址，并输出多语言版本对应关系 */}}
    <link rel="canonical" href="{{ .Permalink }}">
    {{ if .IsTranslated }}
      {{ range .AllTranslations }}
        <link rel="alternate" hreflang="{{ or .Language.LanguageCode .Language.Lang }}" href="{{ .Permalink }}">
      {{ end }}
    {{ end }}

  </head>
  <body>
    {{ partial "header.html" . }}
    {{ partial "breadcrumbs.html" . }}
    {{ block "main" . }}{{ end }}
  </body>
</html>
